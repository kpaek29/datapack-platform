services:
  - type: web
    name: datapack-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: datapack-storage
      mountPath: /data
      sizeGB: 1
